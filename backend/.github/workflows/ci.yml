name: Nyaya CI Pipeline

on:
  push:
    branches: [ main, feature/tantra-convergence-ready ]
  pull_request:
    branches: [ main, feature/tantra-convergence-ready ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      NYAI_API_KEY: test-key-ci-default
      RATE_LIMIT_PER_MINUTE: "60"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.1.2 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run basic import check
        working-directory: backend
        run: |
          python -c "import api.main"

      - name: Run TANTRA convergence and production hardening tests
        working-directory: backend
        run: pytest tests/test_tantra_convergence.py tests/test_production_hardening.py tests/test_evidence_infrastructure.py -v --tb=short

      - name: Run Phase V platform infrastructure tests
        working-directory: backend
        run: pytest tests/test_knowledge_repository.py tests/test_ingestion_pipeline.py tests/test_workspace_apis.py tests/test_graph_runtime.py tests/test_promotion_pipeline.py tests/test_knowledge_integration.py tests/test_replay_knowledge.py tests/test_determinism_knowledge.py tests/test_knowledge_failure.py -v --tb=short

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build -t nyaya-backend .
