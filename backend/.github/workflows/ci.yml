name: Nyaya CI Pipeline

on:
  push:
    branches: [ main, feature/tantra-convergence-ready ]
  pull_request:
    branches: [ main, feature/tantra-convergence-ready ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run basic import check
        working-directory: backend
        run: |
          python -c "import api.main"

      - name: Run TANTRA convergence tests
        working-directory: backend
        run: pytest tests/test_tantra_convergence.py -v --tb=short

      - name: Run full test suite
        working-directory: backend
        run: pytest tests/ -v --tb=short --ignore=tests/debug_addon.py --ignore=tests/debug_authority_assault.py --ignore=tests/debug_new_addon.py

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build -t nyaya-backend .
